<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Orçamento Dinâmico</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f8f9fa; padding:30px; }
.card { border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
.item { cursor:pointer; }
.item:hover { background:#f1f1f1; }
</style>
</head>

<body>

<div class="container">

<h2 class="mb-3">Criar Orçamento</h2>

<div class="row">

<!-- LISTA DE ITENS -->
<div class="col-md-6">
<div class="card p-3">
<h5>Itens disponíveis</h5>
<div id="listaItens"></div>
</div>
</div>

<!-- ORÇAMENTO -->
<div class="col-md-6">
<div class="card p-3">
<h5>Orçamento</h5>

<div id="orcamento"></div>

<hr>

<h5>Total: R$ <span id="total">0.00</span></h5>

<hr>

<label>Forma de pagamento</label>
<select id="pagamento" class="form-control">
    <option>Dinheiro</option>
    <option>Cartão</option>
    <option>Pix</option>
</select>

<button class="btn btn-success w-100 mt-3" onclick="finalizar()">
Finalizar Orçamento
</button>

</div>
</div>

</div>
</div>

<script>

const API_ITENS = "http://localhost:3000/api/componentes";

let itensDisponiveis = [];
let carrinho = [];

// 🔥 CARREGAR ITENS DO BACKEND
async function carregarItens() {
    const res = await fetch(API_ITENS);
    itensDisponiveis = await res.json();

    let html = "";

    itensDisponiveis.forEach(item => {
        html += `
        <div class="border p-2 mb-2 item" onclick="adicionar(${item.id})">
            <b>${item.nome}</b><br>
            R$ ${item.preco}
        </div>
        `;
    });

    document.getElementById("listaItens").innerHTML = html;
}

// 🔥 ADICIONAR NO ORÇAMENTO
function adicionar(id) {
    const item = itensDisponiveis.find(i => i.id === id);
    carrinho.push(item);
    renderizarCarrinho();
}

// 🔥 REMOVER ITEM
function remover(index) {
    carrinho.splice(index, 1);
    renderizarCarrinho();
}

// 🔥 ATUALIZAR ORÇAMENTO
function renderizarCarrinho() {
    let html = "";
    let total = 0;

    carrinho.forEach((item, index) => {
        total += Number(item.preco);

        html += `
        <div class="border p-2 mb-2">
            ${item.nome} - R$ ${item.preco}
            <button class="btn btn-sm btn-danger float-end" onclick="remover(${index})">X</button>
        </div>
        `;
    });

    document.getElementById("orcamento").innerHTML = html;
    document.getElementById("total").innerText = total.toFixed(2);
}

// 🔥 FINALIZAR ORÇAMENTO (FRONTEND)
function finalizar() {
    const pagamento = document.getElementById("pagamento").value;

    const total = carrinho.reduce((acc, item) => acc + Number(item.preco), 0);

    const orcamentoFinal = {
        itens: carrinho,
        total: total,
        pagamento: pagamento
    };

    console.log("ORÇAMENTO FINAL:", orcamentoFinal);

    alert("Orçamento gerado! Veja o console.");
}

carregarItens();

</script>

</body>
</html>
