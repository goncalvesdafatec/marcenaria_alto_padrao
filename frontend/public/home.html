<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Principal - Marcenaria Alto Padrão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }
        .card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }
    </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">🪚 Marcenaria Alto Padrão</span>
        <a href="index.html" class="btn btn-danger btn-sm fw-bold">Sair</a>
    </div>
</nav>

<div class="container">

    <h1 class="text-center mb-5 fw-bold text-dark">Dashboard de Controle</h1>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow-sm h-100 border-0">
                <img src="https://images.unsplash.com/photo-1581094288338-2314dddb7eed?w=500&auto=format&fit=crop&q=60" class="card-img-top" alt="Clientes">
                <div class="card-body text-center d-flex flex-column justify-content-between">
                    <h5 class="fw-bold">Clientes</h5>
                    <a href="clientes.html" class="btn btn-primary w-100 mt-2 fw-bold">Acessar</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm h-100 border-0">
                <img src="https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=500&auto=format&fit=crop&q=60" class="card-img-top" alt="Orçamentos">
                <div class="card-body text-center d-flex flex-column justify-content-between">
                    <h5 class="fw-bold">Orçamentos</h5>
                    <a href="orcamento.html" class="btn btn-success w-100 mt-2 fw-bold">Acessar</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm h-100 border-0">
                <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e?w=500&auto=format&fit=crop&q=60" class="card-img-top" alt="Projetos">
                <div class="card-body text-center d-flex flex-column justify-content-between">
                    <h5 class="fw-bold">Projetos</h5>
                    <button class="btn btn-warning w-100 mt-2 fw-bold text-dark" onclick="listarProjetos()">
                        Listar
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm h-100 border-0">
                <img src="https://images.unsplash.com/photo-1616594039964-ae9021a400a0?w=500&auto=format&fit=crop&q=60" class="card-img-top" alt="Ambientes">
                <div class="card-body text-center d-flex flex-column justify-content-between">
                    <h5 class="fw-bold">Ambientes</h5>
                    <a href="ambientes.html" class="btn btn-info w-100 mt-2 fw-bold text-dark">Acessar</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm h-100 border-0">
                <img src="https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=500&auto=format&fit=crop&q=60" class="card-img-top" alt="Componentes">
                <div class="card-body text-center d-flex flex-column justify-content-between">
                    <h5 class="fw-bold">Componentes</h5>
                    <a href="componentes.html" class="btn btn-secondary w-100 mt-2 fw-bold">Acessar</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm h-100 border-0">
                <img src="https://images.unsplash.com/photo-1530124566582-a618bc2615fd?w=500&auto=format&fit=crop&q=60" class="card-img-top" alt="Estoque">
                <div class="card-body text-center d-flex flex-column justify-content-between">
                    <h5 class="fw-bold">Estoque</h5>
                    <a href="estoque.html" class="btn btn-dark w-100 mt-2 fw-bold">Acessar</a>
                </div>
            </div>
        </div>

    </div>

    <div id="resultadoProjetos" class="mt-5 mb-5"></div>

</div>

<script>
    async function listarProjetos() {
        const containerResultado = document.getElementById('resultadoProjetos');
        
        // Se a div de destino não existir por algum motivo, avisa na hora
        if (!containerResultado) {
            alert("Erro crítico: O container 'resultadoProjetos' não foi encontrado no HTML.");
            return;
        }

        // Adiciona feedback visual imediato
        containerResultado.innerHTML = `
            <div class="alert alert-info text-center shadow-sm py-4">
                <div class="spinner-border text-primary mb-2" role="status"></div>
                <div>A carregar projetos diretamente do MySQL...</div>
            </div>
        `;

        try {
            const resposta = await fetch('/api/projetos');
            
            if (!resposta.ok) {
                throw new Error(`Erro na rota do servidor: Código ${resposta.status}`);
            }

            const projetos = await resposta.json();
            console.log("Dados recebidos:", projetos);

            if (!projetos || projetos.length === 0) {
                containerResultado.innerHTML = `
                    <div class="alert alert-warning text-center shadow-sm fw-bold">
                        📭 Nenhum projeto registado na base de dados.
                    </div>
                `;
                return;
            }

            // Início da tabela estruturada com Bootstrap
            let htmlTabela = `
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-warning text-dark fw-bold fs-5 py-3">
                        📋 Projetos Ativos Encontrados (${projetos.length})
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID Projeto</th>
                                    <th>ID Cliente</th>
                                    <th>Valor Total</th>
                                    <th>Data de Criação</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            // Mapeia os dados baseados nas colunas REAIS do seu MySQL
            projetos.forEach(proj => {
                const id = proj.id;
                const clienteId = proj.cliente_id;
                const status = proj.status || 'Orçamento';
                
                // Conversão de valores
                const valorTotal = proj.valor_total ? parseFloat(proj.valor_total).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : 'R$ 0,00';
                const dataCriacao = proj.data_criacao ? new Date(proj.data_criacao).toLocaleDateString('pt-BR') : '---';

                // Configuração das cores de badges conforme o status real da sua imagem
                let badgeClass = 'bg-secondary';
                if (status === 'Finalizado' || status === 'Finalizado') badgeClass = 'bg-success';
                if (status === 'Execução' || status === 'Execucao') badgeClass = 'bg-primary';
                if (status === 'Em Planejamento' || status === 'Em Planejamento') badgeClass = 'bg-info text-dark';
                if (status === 'Aguardando Material') badgeClass = 'bg-warning text-dark';
                if (status === 'Orçamento') badgeClass = 'bg-dark';

                htmlTabela += `
                    <tr>
                        <td class="fw-bold text-dark">#${id}</td>
                        <td><span class="badge bg-light text-dark border">👤 Cliente: ${clienteId}</span></td>
                        <td class="fw-bold text-success">${valorTotal}</td>
                        <td class="text-muted small">${dataCriacao}</td>
                        <td><span class="badge ${badgeClass}">${status}</span></td>
                    </tr>
                `;
            });

            htmlTabela += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            // Aplica o HTML gerado na tela
            containerResultado.innerHTML = htmlTabela;

        } catch (erro) {
            console.error("Erro no processamento:", erro);
            containerResultado.innerHTML = `
                <div class="alert alert-danger shadow-sm text-center">
                    <h5 class="fw-bold m-0">❌ Não foi possível carregar a tabela!</h5>
                    <p class="small mt-2 mb-0">Verifique se o Node está ligado no terminal. Detalhe: <code>${erro.message}</code></p>
                </div>
            `;
        }
    }
</script>

</body>
</html>
