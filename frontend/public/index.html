<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcenaria Alto Padrão - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* CSS TOTALMENTE EMBUTIDO PARA NÃO SUMIR NADA */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f8f9fa;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Lado esquerdo: Imagem fixa de marcenaria de alto padrão */
        .login-bg-image {
            background-image: url('https://images.unsplash.com/photo-1540555700478-4be289fbecef?w=1200&auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }

        /* Lado direito: Centralização vertical e horizontal perfeita do card */
        .login-form-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
        }

        /* Estrutura do Card de Login */
        .card-login {
            border: none !important;
            max-width: 420px;
            width: 100%;
            padding: 2.5rem;
        }

        /* Efeito visual refinado no botão */
        .btn-entrar {
            background-color: #212529;
            color: #ffffff;
            border: none;
            transition: background-color 0.2s;
        }
        .btn-entrar:hover {
            background-color: #343a40;
            color: #ffffff;
        }
    </style>
</head>

<body>

    <div class="container-fluid p-0">
        <div class="row g-0">
            
            <div class="col-md-6 col-lg-7 d-none d-md-block login-bg-image"></div>

            <div class="col-12 col-md-6 col-lg-5 login-form-container shadow-lg">
                
                <div class="card-login">
                    
                    <div class="text-center mb-4">
                        <div class="mb-2">
                            <span style="font-size: 3.5rem;">🪚</span>
                        </div>
                        <h2 class="fw-bold text-dark m-0">Alto Padrão</h2>
                        <p class="text-muted small">Sistema de Gestão de Marcenaria</p>
                    </div>

                    <form id="formularioLogin" onsubmit="liberarAcesso(event)">
                        
                        <div class="mb-3">
                            <label for="usuario" class="form-label fw-bold text-secondary small">Utilizador</label>
                            <input type="text" class="form-control form-control-lg" id="usuario" value="admin@admin" required>
                        </div>

                        <div class="mb-4">
                            <label for="senha" class="form-label fw-bold text-secondary small">Palavra-passe</label>
                            <input type="password" class="form-control form-control-lg" id="senha" value="123456" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-entrar btn-lg fw-bold shadow-sm">
                                Entrar no Painel
                            </button>
                        </div>
                        
                    </form>

                    <div class="text-center mt-5">
                        <small class="text-muted">&copy; 2026 Marcenaria Alto Padrão</small>
                    </div>

                </div>

            </div>
            
        </div>
    </div>

    <script>
        function liberarAcesso(event) {
            // Evita que o navegador envie um POST para o Express e quebre o fluxo
            event.preventDefault();
            
            console.log("Acesso autorizado. Redirecionando...");
            
            // Força o navegador a carregar a tela do painel principal
            window.location.href = "home.html";
        }
    </script>

</body>
</html>
