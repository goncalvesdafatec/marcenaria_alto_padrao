<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>

<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h2 class="mb-4">Cadastro de Cliente</h2>

                <form id="formCliente" onsubmit="salvarCliente(event)">
                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" id="nome" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Telefone</label>
                        <input type="text" id="telefone" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="emailCliente" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Salvar Cliente
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
const API = "http://localhost:3000/api/clientes";

async function salvarCliente(event) {
    // Evita que a página recarregue sozinha e limpe o console do navegador
    event.preventDefault();

    const nome = document.getElementById("nome").value.trim();
    const telefone = document.getElementById("telefone").value.trim();
    const email = document.getElementById("emailCliente").value.trim();

    if (!nome || !telefone || !email) {
        alert("Preencha todos os campos!");
        return;
    }

    try {
        const resposta = await fetch(API, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ nome, telefone, email })
        });

        // 🟢 PASSO CHAVE: Captura a resposta bruta como texto primeiro
        const textoBruto = await resposta.text();
        console.log("Resposta bruta do servidor:", textoBruto);

        let dados = {};
        try {
            // Tenta converter para JSON se o backend enviou um objeto
            dados = JSON.parse(textoBruto);
        } catch (e) {
            // Se não for JSON, joga o texto puro para dentro da propriedade erro
            dados = { erro: textoBruto };
        }

        if (resposta.ok) {
            alert("Cliente salvo com sucesso!");
            document.getElementById("formCliente").reset();
        } else {
            console.error("Erro detalhado retornado pelo servidor:", dados);
            
            // Exibe a string real na tela para sabermos o motivo
            const mensagemErro = dados.erro || textoBruto || "Erro desconhecido no servidor.";
            alert("Erro do Servidor:\n" + mensagemErro);
        }

    } catch (error) {
        console.error("Erro fatal na requisição:", error);
        alert("Erro de conexão com o backend! Verifique se o servidor está rodando.");
    }
}
</script>

</body>
</html>
