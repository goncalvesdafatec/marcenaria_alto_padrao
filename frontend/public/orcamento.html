<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand">Novo Orçamento</span>
        <a href="home.html" class="btn btn-light">Voltar</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow p-4">
        <h2>Criar Orçamento</h2>

        <div class="row g-3 mb-4">
            <div class="col-md-5">
                <label class="form-label">Item / Ambiente</label>
                <select id="select-item" class="form-select" onchange="atualizarPrecoExibido()">
                    <option value="0">Selecione o item...</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Qtd</label>
                <input type="number" id="qtd" class="form-control" value="1" oninput="atualizarPrecoExibido()">
            </div>
            <div class="col-md-3">
                <label class="form-label">Subtotal</label>
                <input type="number" id="valor" class="form-control" readonly>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="button" class="btn btn-primary w-100" onclick="adicionarItemALista()">Adicionar</button>
            </div>
        </div>

        <table id="tabela-itens" class="table table-striped mb-3">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Qtd</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h4>Total Geral: R$ <span id="valor-total-geral">0.00</span></h4>

        <hr>

        <div class="mb-3">
            <label class="form-label">ID Cliente</label>
            <input type="number" id="cliente_id" class="form-control">
        </div>

        <button class="btn btn-success w-100" onclick="salvarOrcamento()">Salvar Orçamento Final</button>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
