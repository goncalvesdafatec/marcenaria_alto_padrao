<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambientes e Componentes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Padronização das imagens dos cards para não distorcerem */
        .img-ambiente {
            height: 180px;
            object-fit: cover;
        }
        .card-ambiente {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        /* Efeito de hover nos cards de ambientes */
        .card-ambiente:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold"> Marcenaria Alto Padrão</span>
        <a href="home.html" class="btn btn-outline-light btn-sm fw-bold">Voltar ao Painel</a>
    </div>
</nav>

<div class="container">
    
    <h2 class="mb-4 fw-bold text-dark">Selecione o Ambiente</h2>
    <div class="row g-4 mb-5">
        
        <div class="col-sm-6 col-md-3">
            <div class="card h-100 shadow-sm border-0 card-ambiente" onclick="filtrarPorAmbiente('Home Office')">
                <img src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?w=500&auto=format&fit=crop&q=60" class="card-img-top img-ambiente" alt="Home Office Planejado">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">Home Office</h5>
                    <p class="card-text text-muted small">Escritórios e estantes</p>
                    <button class="btn btn-sm btn-dark w-100 fw-bold">Ver Itens</button>
                </div>
            </div>
        </div>

        <div class="col-sm-6 col-md-3">
            <div class="card h-100 shadow-sm border-0 card-ambiente" onclick="filtrarPorAmbiente('Sala')">
                <img src="https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?w=500&auto=format&fit=crop&q=60" class="card-img-top img-ambiente" alt="Sala de Estar Planejada">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">Sala</h5>
                    <p class="card-text text-muted small">Painéis de TV e racks</p>
                    <button class="btn btn-sm btn-dark w-100 fw-bold">Ver Itens</button>
                </div>
            </div>
        </div>

        <div class="col-sm-6 col-md-3">
            <div class="card h-100 shadow-sm border-0 card-ambiente" onclick="filtrarPorAmbiente('Quarto')">
                <img src="https://images.unsplash.com/photo-1616594039964-ae9021a400a0?w=500&auto=format&fit=crop&q=60" class="card-img-top img-ambiente" alt="Quarto Planejado">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">Quarto</h5>
                    <p class="card-text text-muted small">Roupeiros e cabeceiras</p>
                    <button class="btn btn-sm btn-dark w-100 fw-bold">Ver Itens</button>
                </div>
            </div>
        </div>

        <div class="col-sm-6 col-md-3">
            <div class="card h-100 shadow-sm border-0 card-ambiente" onclick="filtrarPorAmbiente('Banheiro')">
                <img src="https://images.unsplash.com/photo-1620626011161-997c51447357?w=500&auto=format&fit=crop&q=60" class="card-img-top img-ambiente" alt="Banheiro Planejado">
                <div class="card-body text-center">
                    <h5 class="card-title fw-bold">Banheiro</h5>
                    <p class="card-text text-muted small">Gabinetes e lavatórios</p>
                    <button class="btn btn-sm btn-dark w-100 fw-bold">Ver Itens</button>
                </div>
            </div>
        </div>

    </div>

    <div class="card shadow-sm border-0 p-4 mb-5 bg-white">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="fw-bold text-dark m-0">Lista Geral de Componentes</h3>
            <span id="badgeFiltro" class="badge bg-secondary fs-6">Exibindo: Todos</span>
        </div>
        
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Item ID</th>
                        <th>Nome do Componente</th>
                        <th>Tipo/Ambiente</th>
                    </tr>
                </thead>
                <tbody id="tabelaComponentes">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Variável global para armazenar os dados vindos do backend
    let listaComponentesGeral = [];

    async function carregarComponentes() {
        const tabela = document.getElementById('tabelaComponentes');
        try {
            const resposta = await fetch('/api/componentes');
            listaComponentesGeral = await resposta.json();

            // Renderiza a tabela completa no início
            renderizarTabela(listaComponentesGeral);
        } catch (erro) {
            console.error("Erro ao carregar componentes:", erro);
            tabela.innerHTML = `<tr><td colspan="4" class="text-center text-danger fw-bold">Erro ao buscar componentes no backend.</td></tr>`;
        }
    }

    // Função auxiliar para montar as linhas do HTML
    function renderizarTabela(dados) {
        const tabela = document.getElementById('tabelaComponentes');
        
        if(dados.length === 0) {
            tabela.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Nenhum componente encontrado para este filtro.</td></tr>`;
            return;
        }

        tabela.innerHTML = dados.map(item => `
            <tr>
                <td class="fw-bold text-secondary">${item.id}</td>
                <td>${item.item_id || item.componente_id || 'N/A'}</td>
                <td>${item.nome}</td>
                <td><span class="badge bg-info text-dark fw-semibold">${item.tipo || 'Geral'}</span></td>
            </tr>
        `).join('');
    }

    // Função que é disparada ao clicar em qualquer um dos 4 cards
    function filtrarPorAmbiente(nomeAmbiente) {
        document.getElementById('badgeFiltro').innerText = `Exibindo: ${nomeAmbiente}`;
        
        // Filtra a lista com base no tipo que vem do banco de dados
        const itensFiltrados = listaComponentesGeral.filter(item => 
            item.tipo && item.tipo.toLowerCase().includes(nomeAmbiente.toLowerCase())
        );
        
        renderizarTabela(itensFiltrados);
    }
    
    document.addEventListener('DOMContentLoaded', carregarComponentes);
</script>

</body>
</html>
